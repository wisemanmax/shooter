<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movement Lab — FPS Prototype</title>
<style>
  /* ═══════════════════════════════════════════════════════════════
     UI STYLES — HUD, debug overlay, settings panel, crosshair
     ═══════════════════════════════════════════════════════════════ */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a0f; font-family: 'JetBrains Mono', 'Fira Code', monospace; }
  canvas { display: block; }

  /* Click-to-play overlay */
  #overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(6, 6, 12, 0.92);
    cursor: pointer; user-select: none;
    transition: opacity 0.3s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay h1 {
    font-size: 2.4rem; color: #e8c547; letter-spacing: 0.15em;
    text-transform: uppercase; margin-bottom: 0.5rem;
    text-shadow: 0 0 30px rgba(232, 197, 71, 0.3);
  }
  #overlay p { color: #888; font-size: 0.85rem; letter-spacing: 0.08em; }
  #overlay .controls-hint {
    margin-top: 2rem; color: #555; font-size: 0.7rem;
    line-height: 1.8; text-align: center; max-width: 400px;
  }
  #overlay .controls-hint span { color: #e8c547; }

  /* Crosshair */
  #crosshair {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 50; pointer-events: none;
  }
  #crosshair .dot {
    width: 3px; height: 3px; background: rgba(255,255,255,0.9);
    border-radius: 50%;
  }
  #crosshair .arm {
    position: absolute; background: rgba(255,255,255,0.5);
  }
  #crosshair .arm.top    { width: 1px; height: 8px; top: -12px; left: 1px; }
  #crosshair .arm.bottom { width: 1px; height: 8px; bottom: -12px; left: 1px; }
  #crosshair .arm.left   { width: 8px; height: 1px; left: -12px; top: 1px; }
  #crosshair .arm.right  { width: 8px; height: 1px; right: -12px; top: 1px; }
  #crosshair.hit .dot { background: #e8c547; box-shadow: 0 0 8px #e8c547; }

  /* Hit marker */
  #hitmarker {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 51; pointer-events: none; opacity: 0;
    transition: opacity 0.05s;
  }
  #hitmarker.show { opacity: 1; }
  #hitmarker svg { width: 24px; height: 24px; }

  /* Debug overlay */
  #debug {
    position: fixed; top: 12px; left: 12px; z-index: 60;
    background: rgba(6, 6, 12, 0.8); border: 1px solid rgba(232, 197, 71, 0.15);
    padding: 10px 14px; border-radius: 4px;
    font-size: 0.7rem; color: #aaa; line-height: 1.7;
    min-width: 200px; pointer-events: none;
    backdrop-filter: blur(4px);
  }
  #debug .label { color: #666; }
  #debug .value { color: #e8c547; font-weight: bold; }
  #debug .state-active { color: #5fe86a; }
  #debug .state-inactive { color: #444; }
  #debug .separator { border-top: 1px solid rgba(255,255,255,0.06); margin: 4px 0; }

  /* Settings panel (ESC menu) */
  #settings {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 90; display: none;
    background: rgba(12, 12, 18, 0.95); border: 1px solid rgba(232, 197, 71, 0.2);
    padding: 28px 32px; border-radius: 6px;
    min-width: 320px; backdrop-filter: blur(8px);
  }
  #settings.show { display: block; }
  #settings h2 {
    color: #e8c547; font-size: 0.9rem; letter-spacing: 0.1em;
    text-transform: uppercase; margin-bottom: 16px;
  }
  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .setting-row label { color: #888; font-size: 0.75rem; }
  .setting-row input[type="range"] {
    width: 140px; accent-color: #e8c547;
  }
  .setting-row .val { color: #e8c547; font-size: 0.75rem; min-width: 36px; text-align: right; }
  .setting-row input[type="checkbox"] { accent-color: #e8c547; }

  /* Speed bar */
  #speedbar-container {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    z-index: 50; pointer-events: none;
  }
  #speedbar-bg {
    width: 200px; height: 3px; background: rgba(255,255,255,0.08);
    border-radius: 2px; overflow: hidden;
  }
  #speedbar-fill {
    height: 100%; width: 0%; border-radius: 2px;
    background: linear-gradient(90deg, #e8c547, #f0a030);
    transition: width 0.05s, background 0.2s;
  }
  #speedbar-fill.sprint { background: linear-gradient(90deg, #f0a030, #e84747); }
  #speedbar-fill.slide  { background: linear-gradient(90deg, #47b8e8, #5fe86a); }
  #speed-text {
    text-align: center; margin-top: 4px;
    font-size: 0.6rem; color: #555; letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<!-- Click-to-play overlay -->
<div id="overlay">
  <h1>Movement Lab</h1>
  <p>Click to enter</p>
  <div class="controls-hint">
    <span>WASD</span> move &nbsp;·&nbsp; <span>SHIFT</span> sprint &nbsp;·&nbsp; <span>CTRL</span> crouch/slide<br>
    <span>SPACE</span> jump &nbsp;·&nbsp; <span>MOUSE</span> look &nbsp;·&nbsp; <span>CLICK</span> shoot<br>

<!-- Crosshair -->

<!-- Hit marker -->
<div id="hitmarker">
  <svg viewBox="0 0 24 24" fill="none" stroke="#e8c547" stroke-width="2">
    <line x1="6" y1="6" x2="10" y2="10"/>
    <line x1="18" y1="6" x2="14" y2="10"/>
    <line x1="6" y1="18" x2="10" y2="14"/>

<!-- Debug overlay -->

  <div><span class="label">STATE </span><span class="value" id="dbg-state">IDLE</span></div>
  <div>
    <span id="dbg-grounded" class="state-inactive">GND</span>&nbsp;
    <span id="dbg-sprint" class="state-inactive">SPR</span>&nbsp;
    <span id="dbg-slide" class="state-inactive">SLD</span>&nbsp;
    <span id="dbg-crouch" class="state-inactive">CRC</span>&nbsp;

  </div>
  <div class="separator"></div>
  <div><span class="label">POS   </span><span class="value" id="dbg-pos">0, 0, 0</span></div>

</div>

<!-- Settings panel -->
<div id="settings">
  <h2>Settings</h2>
  <div class="setting-row">
    <label>Sensitivity</label>
    <input type="range" id="set-sens" min="0.5" max="5" step="0.1" value="1.0">
    <span class="val" id="set-sens-val">1.0</span>
  </div>
  <div class="setting-row">
    <label>FOV</label>
    <input type="range" id="set-fov" min="60" max="120" step="1" value="90">
    <span class="val" id="set-fov-val">90</span>
  </div>
  <div class="setting-row">
    <label>Debug overlay</label>
    <input type="checkbox" id="set-debug" checked>
  </div>
  <div class="setting-row">
    <label>Speed bar</label>
    <input type="checkbox" id="set-speedbar" checked>
  </div>
</div>

<!-- Speed bar -->
<div id="speedbar-container">
  <div id="speedbar-bg"><div id="speedbar-fill"></div></div>
  <div id="speed-text">0.0 u/s</div>
</div>

<!-- Import Three.js and run game -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.163.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

/* ═══════════════════════════════════════════════════════════════════════════
   MODULE 1: CONFIG
   All tunable movement variables live here. See TUNING_GUIDE.md for details.
   ═══════════════════════════════════════════════════════════════════════════ */
const CONFIG = {
  // ── Ground movement ──
  WALK_SPEED:       6.0,    // max walk speed (units/sec)
  SPRINT_SPEED:     10.5,   // max sprint speed
  CROUCH_SPEED:     3.0,    // max crouch-walk speed
  GROUND_ACCEL:     55.0,   // ground acceleration rate
  GROUND_FRICTION:  9.0,    // ground friction (higher = faster stop)

  // ── Air movement ──
  AIR_ACCEL:        12.0,   // acceleration while airborne
  AIR_SPEED_CAP:    2.5,    // max speed gain per tick in air (strafe cap)
  AIR_FRICTION:     0.2,    // minimal air drag

  // ── Slide ──
  SLIDE_ENTRY_SPEED:   5.0,  // minimum speed to begin a slide
  SLIDE_BOOST:         1.15, // speed multiplier on slide entry
  SLIDE_FRICTION:      2.2,  // friction during slide (lower = longer slide)
  SLIDE_MIN_SPEED:     2.0,  // speed at which slide auto-ends
  SLIDE_COOLDOWN:      0.4,  // seconds before can slide again
  SLIDE_GRAVITY_MULT:  1.5,  // extra gravity pull on downhill slides

  // ── Jump ──
  JUMP_FORCE:       8.5,    // initial upward velocity
  GRAVITY:          23.0,   // downward acceleration
  COYOTE_TIME:      0.1,    // grace period after leaving ledge (seconds)
  JUMP_BUFFER_TIME: 0.1,    // pre-land jump buffer (seconds)

  // ── Mantle ──
  MANTLE_MAX_HEIGHT: 2.2,   // tallest obstacle player can vault
  MANTLE_MIN_HEIGHT: 0.4,   // shortest obstacle worth vaulting
  MANTLE_REACH:      1.0,   // forward raycast distance
  MANTLE_DURATION:   0.25,  // seconds to complete mantle animation

  // ── Player dimensions ──
  PLAYER_HEIGHT:       1.8,
  PLAYER_CROUCH_HEIGHT:1.0,
  PLAYER_RADIUS:       0.35,
  EYE_OFFSET_RATIO:    0.85,  // eye height as fraction of body height
  STEP_HEIGHT:         0.35,  // max stair-step height

  // ── Camera ──
  BASE_SENSITIVITY: 0.002,
  BASE_FOV:         90,
  FOV_SPRINT_ADD:   5,
  FOV_SLIDE_ADD:    10,
  FOV_LERP_SPEED:   8.0,
  TILT_SLIDE_DEG:   4,       // camera roll during slide (degrees)
  TILT_LERP_SPEED:  10.0,
  HEAD_BOB_SPEED:   10.0,    // walk bob frequency
  HEAD_BOB_AMOUNT:  0.03,    // walk bob amplitude
};


/* ═══════════════════════════════════════════════════════════════════════════
   MODULE 2: INPUT MANAGER
   Tracks keyboard state, mouse deltas, pointer lock. No game logic here.
   ═══════════════════════════════════════════════════════════════════════════ */
const Input = {
  keys: {},
  mouseDX: 0, mouseDY: 0,
  mouseDown: false,
  locked: false,
  sensitivityMult: 1.0,

  init(canvas) {
    // Keyboard
    window.addEventListener('keydown', e => {
      this.keys[e.code] = true;
      if (e.code === 'Tab') e.preventDefault();
    });
    window.addEventListener('keyup', e => { this.keys[e.code] = false; });

    // Mouse movement (only accumulate when locked)
    document.addEventListener('mousemove', e => {
      if (!this.locked) return;
      this.mouseDX += e.movementX;
      this.mouseDY += e.movementY;
    });

    // Mouse click
    canvas.addEventListener('mousedown', () => { this.mouseDown = true; });
    canvas.addEventListener('mouseup', () => { this.mouseDown = false; });

    // Pointer lock events
    document.addEventListener('pointerlockchange', () => {
      this.locked = !!document.pointerLockElement;
    });

    // Click canvas to lock
    canvas.addEventListener('click', () => {
      if (!this.locked) canvas.requestPointerLock();
    });
  },

  /** Consume accumulated mouse delta — call once per frame */
  consumeMouse() {
    const dx = this.mouseDX;
    const dy = this.mouseDY;
    this.mouseDX = 0;
    this.mouseDY = 0;
    return { dx, dy };
  },

  /** Consume one-shot click (returns true once per press) */
  consumeClick() {
    if (this.mouseDown) { this.mouseDown = false; return true; }
    return false;
  },

  isDown(code) { return !!this.keys[code]; },

  // Convenience getters for movement keys
  get forward()  { return this.isDown('KeyW') || this.isDown('ArrowUp'); },
  get backward() { return this.isDown('KeyS') || this.isDown('ArrowDown'); },
  get left()     { return this.isDown('KeyA') || this.isDown('ArrowLeft'); },
  get right()    { return this.isDown('KeyD') || this.isDown('ArrowRight'); },
  get sprint()   { return this.isDown('ShiftLeft') || this.isDown('ShiftRight'); },
  get crouch()   { return this.isDown('ControlLeft') || this.isDown('ControlRight') || this.isDown('KeyC'); },
  get jump()     { return this.isDown('Space'); },
};


/* ═══════════════════════════════════════════════════════════════════════════
   MODULE 3: COLLISION HELPERS
   Simple AABB vs sphere collision and raycasting utilities.
   ═══════════════════════════════════════════════════════════════════════════ */
const Collision = {
  collidables: [],   // THREE.Mesh array — used for raycasting
  aabbs: [],         // { min: Vec3, max: Vec3, mesh } — used for horizontal push
  groundMeshes: [],  // meshes that participate in ground raycasting (includes ramps)

  /** Rebuild AABB list from current collidable meshes */
  rebuild() {
    this.aabbs = [];
    for (const mesh of this.collidables) {
      const box = new THREE.Box3().setFromObject(mesh);
      this.aabbs.push({ min: box.min, max: box.max, mesh });
    }
  },

  /**
   * Resolve horizontal (XZ) collision for a cylinder-shaped player.
   * Pushes player out of any overlapping AABB on the XZ plane.
   */
  resolveHorizontal(pos, radius, height) {
    const playerMin = { x: pos.x - radius, z: pos.z - radius };
    const playerMax = { x: pos.x + radius, z: pos.z + radius };
    const playerBottom = pos.y;
    const playerTop = pos.y + height;

    for (const aabb of this.aabbs) {
      // Skip if no vertical overlap
      if (playerTop <= aabb.min.y || playerBottom >= aabb.max.y) continue;
      // Check XZ overlap
      if (playerMax.x <= aabb.min.x || playerMin.x >= aabb.max.x) continue;
      if (playerMax.z <= aabb.min.z || playerMin.z >= aabb.max.z) continue;

      // Calculate penetration on each XZ axis
      const overlapX1 = playerMax.x - aabb.min.x; // push -X
      const overlapX2 = aabb.max.x - playerMin.x;  // push +X
      const overlapZ1 = playerMax.z - aabb.min.z; // push -Z
      const overlapZ2 = aabb.max.z - playerMin.z;  // push +Z

      const minOverlapX = overlapX1 < overlapX2 ? -overlapX1 : overlapX2;
      const minOverlapZ = overlapZ1 < overlapZ2 ? -overlapZ1 : overlapZ2;

      // Push along the axis with smallest penetration
      if (Math.abs(minOverlapX) < Math.abs(minOverlapZ)) {
        pos.x += minOverlapX;
      } else {
        pos.z += minOverlapZ;
      }
    }
  },

  /**
   * Cast a ray downward from (pos + upOffset) to find ground height.
   * Returns { hit: boolean, height: number, normal: Vec3 }
   */
  groundCheck(pos, upOffset = 2.0, maxDist = 4.0) {
    const origin = new THREE.Vector3(pos.x, pos.y + upOffset, pos.z);
    const raycaster = new THREE.Raycaster(origin, new THREE.Vector3(0, -1, 0), 0, maxDist);
    const hits = raycaster.intersectObjects(this.groundMeshes, false);
    if (hits.length > 0) {
      return { hit: true, height: hits[0].point.y, normal: hits[0].face.normal.clone() };
    }
    return { hit: false, height: -Infinity, normal: new THREE.Vector3(0, 1, 0) };
  },

  /**
   * Forward raycast for mantle detection.
   * Returns { hit, point, distance } or null
   */
  forwardCheck(origin, direction, maxDist) {
    const raycaster = new THREE.Raycaster(origin, direction, 0, maxDist);
    const hits = raycaster.intersectObjects(this.collidables, false);
    if (hits.length > 0) return { hit: true, point: hits[0].point, distance: hits[0].distance };
    return null;
  },

  /**
   * Shoot ray from camera center for target hit detection.
   * Returns intersected objects sorted by distance.
   */
  shootRay(origin, direction, maxDist = 200) {
    const raycaster = new THREE.Raycaster(origin, direction, 0, maxDist);
    return raycaster.intersectObjects(this.collidables, false);
  }
};


/* ═══════════════════════════════════════════════════════════════════════════
   MODULE 4: PLAYER CONTROLLER
   Movement state machine, physics integration, mantle logic.
   ═══════════════════════════════════════════════════════════════════════════ */

// Movement states
const State = { GROUNDED: 0, AIRBORNE: 1, SLIDING: 2, MANTLING: 3 };

class Player {
  constructor() {
    this.position = new THREE.Vector3(0, 0.5, 0);
    this.velocity = new THREE.Vector3(0, 0, 0);
    this.yaw = 0;          // horizontal look (radians)
    this.pitch = 0;         // vertical look (radians)

    this.state = State.AIRBORNE;
    this.height = CONFIG.PLAYER_HEIGHT;
    this.isSprinting = false;
    this.isCrouching = false;

    // Timers
    this.coyoteTimer = 0;
    this.jumpBufferTimer = 0;
    this.slideCooldownTimer = 0;
    this.wasGroundedLastFrame = false;

    // Mantle state
    this.mantleStart = new THREE.Vector3();
    this.mantleEnd = new THREE.Vector3();
    this.mantleProgress = 0;

    // Head bob
    this.bobPhase = 0;
    this.bobOffset = 0;

    // Camera effects
    this.currentTilt = 0;    // roll in degrees
    this.currentFovAdd = 0;  // added to base FOV
  }

  /** Get eye position in world space */
  get eyePosition() {
    return new THREE.Vector3(
      this.position.x,
      this.position.y + this.height * CONFIG.EYE_OFFSET_RATIO + this.bobOffset,
      this.position.z
    );
  }

  /** Get horizontal speed (XZ plane) */
  get horizontalSpeed() {
    return Math.sqrt(this.velocity.x ** 2 + this.velocity.z ** 2);
  }

  /** Forward direction on XZ plane based on yaw */
  get forwardDir() {
    return new THREE.Vector3(-Math.sin(this.yaw), 0, -Math.cos(this.yaw)).normalize();
  }

  /** Right direction on XZ plane */
  get rightDir() {
    return new THREE.Vector3(-Math.cos(this.yaw), 0, Math.sin(this.yaw)).normalize();
  }

  /**
   * Main update — called every frame.
   * Handles input → state transitions → physics → collision.
   */
  update(dt) {
    // Clamp dt to prevent physics explosions on tab-switch
    dt = Math.min(dt, 0.05);

    // Tick cooldown timers
    this.slideCooldownTimer = Math.max(0, this.slideCooldownTimer - dt);
    this.coyoteTimer = Math.max(0, this.coyoteTimer - dt);
    this.jumpBufferTimer = Math.max(0, this.jumpBufferTimer - dt);

    // Buffer jump input
    if (Input.jump) this.jumpBufferTimer = CONFIG.JUMP_BUFFER_TIME;

    // ── Calculate wish direction from input ──
    const wishDir = new THREE.Vector3(0, 0, 0);
    if (Input.forward)  wishDir.add(this.forwardDir);
    if (Input.backward) wishDir.sub(this.forwardDir);
    if (Input.right)    wishDir.add(this.rightDir);
    if (Input.left)     wishDir.sub(this.rightDir);
    if (wishDir.lengthSq() > 0) wishDir.normalize();

    // ── State-specific update ──
    switch (this.state) {
      case State.GROUNDED: this._updateGrounded(dt, wishDir); break;
      case State.AIRBORNE: this._updateAirborne(dt, wishDir); break;
      case State.SLIDING:  this._updateSliding(dt, wishDir); break;
      case State.MANTLING: this._updateMantling(dt); break;
    }

    // ── Apply velocity to position ──
    if (this.state !== State.MANTLING) {
      this.position.x += this.velocity.x * dt;
      this.position.y += this.velocity.y * dt;
      this.position.z += this.velocity.z * dt;
    }

    // ── Ground detection ──
    const ground = Collision.groundCheck(this.position);
    if (ground.hit) {
      const feetY = this.position.y;
      const groundY = ground.height;

      if (this.state === State.AIRBORNE && this.velocity.y <= 0 && feetY <= groundY + 0.05) {
        // Land
        this.position.y = groundY;
        this.velocity.y = 0;
        this._enterState(State.GROUNDED);
      } else if (this.state === State.GROUNDED || this.state === State.SLIDING) {
        // Snap to ground (handles slopes)
        if (feetY - groundY < CONFIG.STEP_HEIGHT && feetY >= groundY - 0.5) {
          this.position.y = groundY;
          if (this.velocity.y < 0) this.velocity.y = 0;
        } else if (feetY > groundY + 0.2) {
          // Walked off a ledge
          this.coyoteTimer = CONFIG.COYOTE_TIME;
          this._enterState(State.AIRBORNE);
        }
      }
    } else if (this.state === State.GROUNDED || this.state === State.SLIDING) {
      // No ground detected — falling
      this.coyoteTimer = CONFIG.COYOTE_TIME;
      this._enterState(State.AIRBORNE);
    }

    // ── Horizontal collision ──
    Collision.resolveHorizontal(this.position, CONFIG.PLAYER_RADIUS, this.height);

    // ── World bounds ──
    const BOUNDS = 38;
    this.position.x = THREE.MathUtils.clamp(this.position.x, -BOUNDS, BOUNDS);
    this.position.z = THREE.MathUtils.clamp(this.position.z, -BOUNDS, BOUNDS);
    if (this.position.y < -10) { this.position.set(0, 5, 0); this.velocity.set(0, 0, 0); }

    // ── Lerp camera effects ──
    let targetTilt = 0;
    let targetFovAdd = 0;
    if (this.state === State.SLIDING) {
      targetTilt = CONFIG.TILT_SLIDE_DEG * (this.velocity.x > 0 ? 1 : -1);
      targetFovAdd = CONFIG.FOV_SLIDE_ADD;
    } else if (this.isSprinting && this.horizontalSpeed > CONFIG.WALK_SPEED) {
      targetFovAdd = CONFIG.FOV_SPRINT_ADD;
    }
    this.currentTilt = THREE.MathUtils.lerp(this.currentTilt, targetTilt, CONFIG.TILT_LERP_SPEED * dt);
    this.currentFovAdd = THREE.MathUtils.lerp(this.currentFovAdd, targetFovAdd, CONFIG.FOV_LERP_SPEED * dt);

    // ── Head bob ──
    if (this.state === State.GROUNDED && this.horizontalSpeed > 1.0 && !this.isCrouching) {
      this.bobPhase += CONFIG.HEAD_BOB_SPEED * dt * (this.isSprinting ? 1.3 : 1.0);
      this.bobOffset = Math.sin(this.bobPhase) * CONFIG.HEAD_BOB_AMOUNT * (this.isSprinting ? 1.5 : 1.0);
    } else {
      this.bobOffset *= 0.9;
    }
  }

  /* ── GROUNDED state ─────────────────────────────────────────────── */
  _updateGrounded(dt, wishDir) {
    this.isSprinting = Input.sprint && !this.isCrouching;
    this.wasGroundedLastFrame = true;

    // Handle crouch toggle
    if (Input.crouch && !this.isCrouching) {
      // Crouch — check if we should slide
      if (this.isSprinting && this.horizontalSpeed >= CONFIG.SLIDE_ENTRY_SPEED
          && this.slideCooldownTimer <= 0) {
        this._enterState(State.SLIDING);
        return;
      }
      this.isCrouching = true;
      this.height = CONFIG.PLAYER_CROUCH_HEIGHT;
    } else if (!Input.crouch && this.isCrouching) {
      // Un-crouch (TODO: ceiling check for safety)
      this.isCrouching = false;
      this.height = CONFIG.PLAYER_HEIGHT;
    }

    // Jump
    if (this.jumpBufferTimer > 0) {
      this.velocity.y = CONFIG.JUMP_FORCE;
      this.jumpBufferTimer = 0;
      this._enterState(State.AIRBORNE);
      return;
    }

    // Determine max speed
    const maxSpeed = this.isCrouching
      ? CONFIG.CROUCH_SPEED
      : (this.isSprinting ? CONFIG.SPRINT_SPEED : CONFIG.WALK_SPEED);

    // Quake-style ground acceleration
    this._accelerate(wishDir, maxSpeed, CONFIG.GROUND_ACCEL, dt);

    // Ground friction
    this._applyFriction(CONFIG.GROUND_FRICTION, dt);
  }

  /* ── AIRBORNE state ─────────────────────────────────────────────── */
  _updateAirborne(dt, wishDir) {
    // Gravity
    this.velocity.y -= CONFIG.GRAVITY * dt;

    // Coyote-time jump
    if (this.jumpBufferTimer > 0 && this.coyoteTimer > 0) {
      this.velocity.y = CONFIG.JUMP_FORCE;
      this.jumpBufferTimer = 0;
      this.coyoteTimer = 0;
    }

    // Air strafing — limited acceleration to preserve momentum
    this._accelerate(wishDir, CONFIG.AIR_SPEED_CAP, CONFIG.AIR_ACCEL, dt);

    // Minimal air drag
    if (CONFIG.AIR_FRICTION > 0) {
      this._applyFriction(CONFIG.AIR_FRICTION, dt);
    }

    // Mantle detection (only when moving forward and rising or near apex)
    if (Input.forward && this.velocity.y < CONFIG.JUMP_FORCE * 0.5) {
      this._tryMantle();
    }

    this.wasGroundedLastFrame = false;
  }

  /* ── SLIDING state ──────────────────────────────────────────────── */
  _updateSliding(dt, wishDir) {
    this.isCrouching = true;
    this.height = CONFIG.PLAYER_CROUCH_HEIGHT;

    // Apply slide friction (much lower than ground)
    this._applyFriction(CONFIG.SLIDE_FRICTION, dt);

    // Slope influence: check ground normal for downhill boost
    const ground = Collision.groundCheck(this.position);
    if (ground.hit && ground.normal.y < 0.98) {
      // On a slope — project gravity onto slope for downhill boost
      const slopeAccel = CONFIG.GRAVITY * (1 - ground.normal.y) * CONFIG.SLIDE_GRAVITY_MULT;
      const slopeDir = new THREE.Vector3(ground.normal.x, 0, ground.normal.z).normalize();
      this.velocity.x += slopeDir.x * slopeAccel * dt;
      this.velocity.z += slopeDir.z * slopeAccel * dt;
    }

    // End slide conditions
    if (this.horizontalSpeed < CONFIG.SLIDE_MIN_SPEED) {
      this._enterState(State.GROUNDED);
      return;
    }
    if (!Input.crouch) {
      this.isCrouching = false;
      this.height = CONFIG.PLAYER_HEIGHT;
      this._enterState(State.GROUNDED);
      return;
    }

    // Jump out of slide
    if (this.jumpBufferTimer > 0) {
      this.velocity.y = CONFIG.JUMP_FORCE;
      this.jumpBufferTimer = 0;
      this.isCrouching = false;
      this.height = CONFIG.PLAYER_HEIGHT;
      this._enterState(State.AIRBORNE);
      return;
    }
  }

  /* ── MANTLING state ─────────────────────────────────────────────── */
  _updateMantling(dt) {
    this.mantleProgress += dt / CONFIG.MANTLE_DURATION;
    if (this.mantleProgress >= 1.0) {
      this.mantleProgress = 1.0;
      this.position.copy(this.mantleEnd);
      this.velocity.set(this.forwardDir.x * 2, 0.5, this.forwardDir.z * 2);
      this._enterState(State.AIRBORNE);
      return;
    }
    // Smooth interpolation: ease-out curve
    const t = 1 - Math.pow(1 - this.mantleProgress, 2);
    this.position.lerpVectors(this.mantleStart, this.mantleEnd, t);
  }

  /* ── Mantle detection ───────────────────────────────────────────── */
  _tryMantle() {
    const fwd = this.forwardDir;
    const feetY = this.position.y;

    // Cast ray forward from waist height
    const waistOrigin = new THREE.Vector3(
      this.position.x, feetY + CONFIG.PLAYER_HEIGHT * 0.5, this.position.z
    );
    const fwdHit = Collision.forwardCheck(waistOrigin, fwd, CONFIG.MANTLE_REACH);
    if (!fwdHit) return;

    // Cast ray down from above the obstacle to find its top
    const abovePoint = new THREE.Vector3(
      fwdHit.point.x + fwd.x * 0.3,
      feetY + CONFIG.MANTLE_MAX_HEIGHT + 1.0,
      fwdHit.point.z + fwd.z * 0.3
    );
    const downResult = Collision.groundCheck(
      { x: abovePoint.x, y: abovePoint.y - 1.0, z: abovePoint.z }, 1.0, CONFIG.MANTLE_MAX_HEIGHT + 1.5
    );
    if (!downResult.hit) return;

    const topY = downResult.height;
    const heightDiff = topY - feetY;

    // Check if in mantleable range
    if (heightDiff < CONFIG.MANTLE_MIN_HEIGHT || heightDiff > CONFIG.MANTLE_MAX_HEIGHT) return;

    // Check for headroom above the ledge
    const headCheckOrigin = new THREE.Vector3(abovePoint.x, topY + 0.1, abovePoint.z);
    const headRay = new THREE.Raycaster(
      headCheckOrigin, new THREE.Vector3(0, 1, 0), 0, CONFIG.PLAYER_HEIGHT
    );
    const headHits = headRay.intersectObjects(Collision.collidables, false);
    if (headHits.length > 0) return; // no headroom

    // ── Begin mantle ──
    this.mantleStart.copy(this.position);
    this.mantleEnd.set(
      fwdHit.point.x + fwd.x * 0.6,
      topY + 0.05,
      fwdHit.point.z + fwd.z * 0.6
    );
    this.mantleProgress = 0;
    this.velocity.set(0, 0, 0);
    this._enterState(State.MANTLING);
  }

  /* ── State transition ───────────────────────────────────────────── */
  _enterState(newState) {
    const prev = this.state;
    this.state = newState;

    if (newState === State.SLIDING) {
      this.height = CONFIG.PLAYER_CROUCH_HEIGHT;
      this.isCrouching = true;
      // Boost speed on slide entry
      const speed = this.horizontalSpeed;
      const dir = new THREE.Vector3(this.velocity.x, 0, this.velocity.z).normalize();
      const boosted = speed * CONFIG.SLIDE_BOOST;
      this.velocity.x = dir.x * boosted;
      this.velocity.z = dir.z * boosted;
    }

    if (prev === State.SLIDING && newState !== State.SLIDING) {
      this.slideCooldownTimer = CONFIG.SLIDE_COOLDOWN;
    }

    if (newState === State.GROUNDED) {
      this.coyoteTimer = 0;
      this.wasGroundedLastFrame = true;
    }
  }

  /* ── Quake-style acceleration ───────────────────────────────────── */
  _accelerate(wishDir, wishSpeed, accel, dt) {
    if (wishDir.lengthSq() === 0) return;
    const currentSpeed = this.velocity.x * wishDir.x + this.velocity.z * wishDir.z;
    const addSpeed = wishSpeed - currentSpeed;
    if (addSpeed <= 0) return;
    let accelSpeed = accel * dt * wishSpeed;
    if (accelSpeed > addSpeed) accelSpeed = addSpeed;
    this.velocity.x += accelSpeed * wishDir.x;
    this.velocity.z += accelSpeed * wishDir.z;
  }

  /* ── Friction ───────────────────────────────────────────────────── */
  _applyFriction(friction, dt) {
    const speed = this.horizontalSpeed;
    if (speed < 0.1) {
      this.velocity.x = 0;
      this.velocity.z = 0;
      return;
    }
    const drop = speed * friction * dt;
    const factor = Math.max(speed - drop, 0) / speed;
    this.velocity.x *= factor;
    this.velocity.z *= factor;
  }

  /** Handle mouse look input */
  applyMouseLook(dx, dy) {
    const sens = CONFIG.BASE_SENSITIVITY * Input.sensitivityMult;
    this.yaw -= dx * sens;
    this.pitch -= dy * sens;
    this.pitch = THREE.MathUtils.clamp(this.pitch, -Math.PI * 0.49, Math.PI * 0.49);
  }
}


/* ═══════════════════════════════════════════════════════════════════════════
   MODULE 5: WORLD BUILDER
   Constructs the test arena — floor, walls, ramps, platforms, obstacles.
   ═══════════════════════════════════════════════════════════════════════════ */

class World {
  constructor(scene) {
    this.scene = scene;
    this.obstacles = [];      // meshes for collision
    this.groundMeshes = [];   // meshes for ground raycasting (includes ramps)
    this.targetMeshes = [];   // hit-feedback dummies
    this._build();
  }

  _build() {
    // ── Materials ──
    const matFloor = new THREE.MeshStandardMaterial({ color: 0x1a1a24, roughness: 0.9 });
    const matWall  = new THREE.MeshStandardMaterial({ color: 0x2a2a38, roughness: 0.7 });
    const matCrate = new THREE.MeshStandardMaterial({ color: 0x3a3530, roughness: 0.6 });
    const matPlat  = new THREE.MeshStandardMaterial({ color: 0x252535, roughness: 0.7 });
    const matRamp  = new THREE.MeshStandardMaterial({ color: 0x2d3040, roughness: 0.8 });
    const matMantle= new THREE.MeshStandardMaterial({ color: 0x403828, roughness: 0.6 });
    const matAccent= new THREE.MeshStandardMaterial({ color: 0xe8c547, roughness: 0.4, metalness: 0.3 });
    const matGrid  = new THREE.MeshStandardMaterial({ color: 0x222230, roughness: 0.95 });

    // ── Ground plane ──
    const floor = this._box(80, 0.5, 80, matFloor, [0, -0.25, 0]);

    // Grid lines on floor for spatial reference
    for (let i = -36; i <= 36; i += 4) {
      this._box(0.02, 0.01, 72, matAccent, [i, 0.01, 0], false);
      this._box(72, 0.01, 0.02, matAccent, [0, 0.01, i], false);
    }

    // ── Perimeter walls ──
    this._box(80, 6, 1, matWall, [0, 3, -40]);
    this._box(80, 6, 1, matWall, [0, 3, 40]);
    this._box(1, 6, 80, matWall, [-40, 3, 0]);
    this._box(1, 6, 80, matWall, [40, 3, 0]);

    // ═══ ZONE A: Mantle Training (left side) ═══
    // Waist-high walls in a row
    this._box(3, 1.2, 0.4, matMantle, [-18, 0.6, -5]);
    this._box(3, 1.2, 0.4, matMantle, [-18, 0.6, 0]);
    this._box(3, 1.2, 0.4, matMantle, [-18, 0.6, 5]);

    // Incrementally taller mantle walls
    this._box(3, 0.8, 0.4, matMantle, [-14, 0.4, -5]);
    this._box(3, 1.4, 0.4, matMantle, [-14, 0.7, 0]);
    this._box(3, 2.0, 0.4, matMantle, [-14, 1.0, 5]);

    // Small gap between two walls (mantle + jump combo)
    this._box(2, 1.5, 4, matMantle, [-22, 0.75, 3]);
    this._box(2, 1.5, 4, matMantle, [-22, 0.75, -3]);

    // ═══ ZONE B: Central Structure (multi-level) ═══
    // Ground floor platform
    this._box(10, 0.3, 10, matPlat, [0, 0.15, 0]);

    // Second floor platform
    this._box(8, 0.3, 8, matPlat, [0, 3, 0]);

    // Pillars supporting second floor
    this._box(0.6, 3, 0.6, matWall, [-3.5, 1.5, -3.5]);
    this._box(0.6, 3, 0.6, matWall, [3.5, 1.5, -3.5]);
    this._box(0.6, 3, 0.6, matWall, [-3.5, 1.5, 3.5]);
    this._box(0.6, 3, 0.6, matWall, [3.5, 1.5, 3.5]);

    // Ramp to second floor (south side)
    this._ramp(6, 3, 3, matRamp, [0, 0, 8], 0);

    // Third floor (small lookout)
    this._box(4, 0.3, 4, matPlat, [0, 5.5, 0]);
    // Ramp from 2nd to 3rd floor
    this._ramp(4, 2.5, 2.5, matRamp, [0, 3, 3.5], 0);

    // ═══ ZONE C: Crate Field (right side) ═══
    const cratePositions = [
      [15, 0.5, -5], [17, 0.5, -3], [15, 0.5, 0], [19, 0.5, 2],
      [16, 0.5, 4], [18, 0.5, -6], [20, 0.5, 0],
    ];
    for (const p of cratePositions) {
      this._box(1, 1, 1, matCrate, p);
    }
    // Stacked crates
    this._box(1, 1, 1, matCrate, [15, 1.5, -5]);
    this._box(1, 1, 1, matCrate, [17, 1.5, -3]);
    this._box(1, 1, 1, matCrate, [15, 2.5, -5]); // triple stack

    // ═══ ZONE D: Elevated Sniper Platform (back) ═══
    this._box(12, 0.4, 6, matPlat, [0, 4, -25]);
    // Ramp up to it
    this._ramp(8, 4, 3, matRamp, [8, 0, -25], Math.PI * 0.5);
    // Railing (partial cover)
    this._box(12, 0.8, 0.2, matWall, [0, 4.6, -22]);

    // ═══ ZONE E: Speed Corridor (south side) ═══
    // Long narrow corridor for slide practice
    this._box(0.3, 2, 20, matWall, [8, 1, 18]);
    this._box(0.3, 2, 20, matWall, [12, 1, 18]);
    // Low overhang forcing slide in the middle
    this._box(4, 0.3, 3, matWall, [10, 1.2, 18]);

    // ═══ ZONE F: Parkour Pillars (front-right) ═══
    this._box(1.5, 1.0, 1.5, matPlat, [25, 0.5, 15]);
    this._box(1.5, 2.0, 1.5, matPlat, [28, 1.0, 15]);
    this._box(1.5, 3.0, 1.5, matPlat, [31, 1.5, 15]);
    this._box(1.5, 4.0, 1.5, matPlat, [34, 2.0, 15]);
    this._box(2.0, 4.0, 2.0, matPlat, [34, 2.0, 11]); // landing pad

    // ═══ Target dummies ═══
    this._createDummy([-18, 0, -10], matAccent);
    this._createDummy([15, 0, 8], matAccent);
    this._createDummy([0, 3.3, -2], matAccent);
    this._createDummy([0, 5.8, 0], matAccent);
    this._createDummy([0, 4.4, -24], matAccent);
    this._createDummy([-5, 0, 15], matAccent);
    this._createDummy([30, 0, -10], matAccent);

    // ── Lighting ──
    const ambient = new THREE.AmbientLight(0x404060, 0.7);
    this.scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
    dirLight.position.set(20, 30, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 80;
    dirLight.shadow.camera.left = -40;
    dirLight.shadow.camera.right = 40;
    dirLight.shadow.camera.top = 40;
    dirLight.shadow.camera.bottom = -40;
    this.scene.add(dirLight);

    const hemiLight = new THREE.HemisphereLight(0x6688cc, 0x222244, 0.4);
    this.scene.add(hemiLight);

    // Point lights for atmosphere
    const pointA = new THREE.PointLight(0xe8c547, 0.8, 20);
    pointA.position.set(0, 5, 0);
    this.scene.add(pointA);

    const pointB = new THREE.PointLight(0x47b8e8, 0.5, 15);
    pointB.position.set(-18, 3, 0);
    this.scene.add(pointB);

    // Fog
    this.scene.fog = new THREE.FogExp2(0x0a0a14, 0.012);

    // Register meshes with collision system
    Collision.collidables = this.obstacles;
    Collision.groundMeshes = this.groundMeshes;
    Collision.rebuild();
  }

  /** Helper: create a box obstacle */
  _box(w, h, d, material, pos, collidable = true) {
    const geo = new THREE.BoxGeometry(w, h, d);
    const mesh = new THREE.Mesh(geo, material);
    mesh.position.set(pos[0], pos[1], pos[2]);
    mesh.receiveShadow = true;
    mesh.castShadow = true;
    this.scene.add(mesh);
    if (collidable) {
      this.obstacles.push(mesh);
      this.groundMeshes.push(mesh);
    }
    return mesh;
  }

  /** Helper: create a ramp (triangular prism) */
  _ramp(length, height, width, material, pos, rotationY = 0) {
    const shape = new THREE.Shape();
    shape.moveTo(0, 0);
    shape.lineTo(length, 0);
    shape.lineTo(length, height);
    shape.closePath();

    const geo = new THREE.ExtrudeGeometry(shape, {
      depth: width,
      bevelEnabled: false,
    });
    // Center the depth
    geo.translate(0, 0, -width / 2);

    const mesh = new THREE.Mesh(geo, material);
    mesh.position.set(pos[0], pos[1], pos[2]);
    mesh.rotation.y = rotationY;
    mesh.receiveShadow = true;
    mesh.castShadow = true;
    this.scene.add(mesh);
    // Ramps participate in ground raycasting and horizontal collision
    this.obstacles.push(mesh);
    this.groundMeshes.push(mesh);
    return mesh;
  }

  /** Helper: create a target dummy (cylinder + sphere head) */
  _createDummy(pos, accentMat) {
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc3333, roughness: 0.5 });
    const headMat = new THREE.MeshStandardMaterial({ color: 0xcc3333, roughness: 0.5 });

    const group = new THREE.Group();
    group.position.set(pos[0], pos[1], pos[2]);

    // Body (cylinder)
    const bodyGeo = new THREE.CylinderGeometry(0.25, 0.3, 1.2, 12);
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.6;
    body.castShadow = true;
    group.add(body);

    // Head (sphere)
    const headGeo = new THREE.SphereGeometry(0.2, 12, 8);
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 1.4;
    head.castShadow = true;
    group.add(head);

    // Base ring
    const ringGeo = new THREE.TorusGeometry(0.35, 0.03, 6, 16);
    const ring = new THREE.Mesh(ringGeo, accentMat);
    ring.rotation.x = Math.PI / 2;
    ring.position.y = 0.02;
    group.add(ring);

    this.scene.add(group);

    // Store refs for hit detection — mark as targets
    body.userData.isTarget = true;
    head.userData.isTarget = true;
    body.userData.group = group;
    head.userData.group = group;
    body.userData.bodyMat = bodyMat;
    head.userData.bodyMat = headMat;
    body.userData.originalColor = 0xcc3333;
    head.userData.originalColor = 0xcc3333;

    this.targetMeshes.push(body, head);
    // Add to collidables for raycast hit detection (but NOT to obstacles for player collision)
    Collision.collidables.push(body, head);
  }
}


/* ═══════════════════════════════════════════════════════════════════════════
   MODULE 6: UI MANAGER
   Debug overlay, settings panel, HUD updates.
   ═══════════════════════════════════════════════════════════════════════════ */

const UI = {
  els: {},
  settingsOpen: false,
  hitFlashTimer: 0,
  fpsBuffer: [],

  init() {
    // Cache DOM refs
    this.els = {
      overlay:   document.getElementById('overlay'),
      debug:     document.getElementById('debug'),
      settings:  document.getElementById('settings'),
      crosshair: document.getElementById('crosshair'),
      hitmarker: document.getElementById('hitmarker'),
      speedFill: document.getElementById('speedbar-fill'),
      speedText: document.getElementById('speed-text'),
      speedBar:  document.getElementById('speedbar-container'),
      // Debug fields
      speed: document.getElementById('dbg-speed'),
      vel:   document.getElementById('dbg-vel'),
      state: document.getElementById('dbg-state'),
      pos:   document.getElementById('dbg-pos'),
      fps:   document.getElementById('dbg-fps'),
      grounded: document.getElementById('dbg-grounded'),
      sprint:   document.getElementById('dbg-sprint'),
      slide:    document.getElementById('dbg-slide'),
      crouch:   document.getElementById('dbg-crouch'),
      air:      document.getElementById('dbg-air'),
      mantle:   document.getElementById('dbg-mantle'),
    };

    // Settings controls
    const sensSlider = document.getElementById('set-sens');
    const sensVal    = document.getElementById('set-sens-val');
    sensSlider.addEventListener('input', () => {
      Input.sensitivityMult = parseFloat(sensSlider.value);
      sensVal.textContent = sensSlider.value;
    });

    const fovSlider = document.getElementById('set-fov');
    const fovVal    = document.getElementById('set-fov-val');
    fovSlider.addEventListener('input', () => {
      CONFIG.BASE_FOV = parseInt(fovSlider.value);
      fovVal.textContent = fovSlider.value;
    });

    const debugCheck = document.getElementById('set-debug');
    debugCheck.addEventListener('change', () => {
      this.els.debug.style.display = debugCheck.checked ? 'block' : 'none';
    });

    const speedCheck = document.getElementById('set-speedbar');
    speedCheck.addEventListener('change', () => {
      this.els.speedBar.style.display = speedCheck.checked ? 'block' : 'none';
    });

    // Tab toggles settings
    window.addEventListener('keydown', e => {
      if (e.code === 'Tab') {
        e.preventDefault();
        this.settingsOpen = !this.settingsOpen;
        this.els.settings.classList.toggle('show', this.settingsOpen);
      }
    });
  },

  /** Update all debug/HUD elements — called every frame */
  update(player, dt) {
    // FPS counter
    this.fpsBuffer.push(1 / dt);
    if (this.fpsBuffer.length > 30) this.fpsBuffer.shift();
    const avgFps = this.fpsBuffer.reduce((a, b) => a + b, 0) / this.fpsBuffer.length;

    // State names
    const stateNames = ['GROUNDED', 'AIRBORNE', 'SLIDING', 'MANTLING'];
    const speed = player.horizontalSpeed;

    // Update debug text
    this.els.speed.textContent = speed.toFixed(1);
    this.els.vel.textContent = `${player.velocity.x.toFixed(1)}, ${player.velocity.y.toFixed(1)}, ${player.velocity.z.toFixed(1)}`;
    this.els.state.textContent = stateNames[player.state];
    this.els.pos.textContent = `${player.position.x.toFixed(1)}, ${player.position.y.toFixed(1)}, ${player.position.z.toFixed(1)}`;
    this.els.fps.textContent = avgFps.toFixed(0);

    // State flags
    const setFlag = (el, active) => el.className = active ? 'state-active' : 'state-inactive';
    setFlag(this.els.grounded, player.state === State.GROUNDED);
    setFlag(this.els.sprint, player.isSprinting);
    setFlag(this.els.slide, player.state === State.SLIDING);
    setFlag(this.els.crouch, player.isCrouching);
    setFlag(this.els.air, player.state === State.AIRBORNE);
    setFlag(this.els.mantle, player.state === State.MANTLING);

    // Speed bar
    const maxDisplaySpeed = CONFIG.SPRINT_SPEED * 1.5;
    const pct = Math.min(speed / maxDisplaySpeed * 100, 100);
    this.els.speedFill.style.width = pct + '%';
    this.els.speedFill.className = '';
    if (player.state === State.SLIDING) this.els.speedFill.classList.add('slide');
    else if (player.isSprinting && speed > CONFIG.WALK_SPEED) this.els.speedFill.classList.add('sprint');
    this.els.speedText.textContent = speed.toFixed(1) + ' u/s';

    // Overlay
    this.els.overlay.classList.toggle('hidden', Input.locked);

    // Hit marker decay
    if (this.hitFlashTimer > 0) {
      this.hitFlashTimer -= dt;
      if (this.hitFlashTimer <= 0) {
        this.els.hitmarker.classList.remove('show');
        this.els.crosshair.classList.remove('hit');
      }
    }
  },

  /** Flash the hit marker */
  showHitMarker() {
    this.els.hitmarker.classList.add('show');
    this.els.crosshair.classList.add('hit');
    this.hitFlashTimer = 0.15;
  }
};


/* ═══════════════════════════════════════════════════════════════════════════
   MODULE 7: MAIN — Initialization, game loop, camera, shooting
   ═══════════════════════════════════════════════════════════════════════════ */

// ── Three.js setup ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a14);

const camera = new THREE.PerspectiveCamera(CONFIG.BASE_FOV, window.innerWidth / window.innerHeight, 0.1, 200);

// ── Create game objects ──
const player = new Player();
player.position.set(0, 1, 15); // Start position

const world = new World(scene);
Input.init(renderer.domElement);
UI.init();

// ── Hit feedback tracking ──
const activeHitEffects = []; // { mesh, timer }

// ── Resize handler ──
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
});

// ── Shooting (hit detection on targets) ──
function handleShooting() {
  if (!Input.consumeClick()) return;
  if (!Input.locked) return;

  // Ray from camera center
  const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  const origin = camera.position.clone();

  const hits = Collision.shootRay(origin, dir, 200);
  for (const hit of hits) {
    if (hit.object.userData.isTarget) {
      UI.showHitMarker();

      // Flash the target white
      const mesh = hit.object;
      const mat = mesh.userData.bodyMat;
      mat.color.setHex(0xffffff);
      mat.emissive.setHex(0xe8c547);
      mat.emissiveIntensity = 0.5;
      activeHitEffects.push({ mat, timer: 0.12 });

      // Wobble the group
      const group = mesh.userData.group;
      if (group) {
        group.rotation.z = (Math.random() - 0.5) * 0.3;
        group.userData.wobbleTimer = 0.3;
      }
      break; // Only register first hit
    }
  }
}

/** Update target hit effects (flash decay, wobble) */
function updateTargetEffects(dt) {
  // Flash decay
  for (let i = activeHitEffects.length - 1; i >= 0; i--) {
    const fx = activeHitEffects[i];
    fx.timer -= dt;
    if (fx.timer <= 0) {
      fx.mat.color.setHex(0xcc3333);
      fx.mat.emissive.setHex(0x000000);
      fx.mat.emissiveIntensity = 0;
      activeHitEffects.splice(i, 1);
    }
  }
  // Wobble decay
  for (const mesh of world.targetMeshes) {
    const group = mesh.userData.group;
    if (group && group.userData.wobbleTimer > 0) {
      group.userData.wobbleTimer -= dt;
      group.rotation.z *= 0.85; // decay wobble
      if (group.userData.wobbleTimer <= 0) group.rotation.z = 0;
    }
  }
}


// ── Game loop ──
let lastTime = performance.now();

function gameLoop(now) {
  requestAnimationFrame(gameLoop);

  const dt = (now - lastTime) / 1000;
  lastTime = now;

  if (dt <= 0 || dt > 0.2) return; // skip bad frames

  // ── Mouse look ──
  if (Input.locked) {
    const mouse = Input.consumeMouse();
    player.applyMouseLook(mouse.dx, mouse.dy);
  }

  // ── Player physics ──
  player.update(dt);

  // ── Shooting ──
  handleShooting();
  updateTargetEffects(dt);

  // ── Update camera ──
  const eye = player.eyePosition;
  camera.position.copy(eye);

  // Build camera rotation from yaw/pitch/tilt
  const euler = new THREE.Euler(player.pitch, player.yaw, THREE.MathUtils.degToRad(player.currentTilt), 'YXZ');
  camera.quaternion.setFromEuler(euler);

  // Dynamic FOV
  const targetFov = CONFIG.BASE_FOV + player.currentFovAdd;
  camera.fov = THREE.MathUtils.lerp(camera.fov, targetFov, CONFIG.FOV_LERP_SPEED * dt);
  camera.updateProjectionMatrix();

  // ── UI ──
  UI.update(player, dt);

  // ── Render ──
  renderer.render(scene, camera);
}

requestAnimationFrame(gameLoop);
</script>
</body>
