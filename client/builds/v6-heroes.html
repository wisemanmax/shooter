<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drop Zone — Hero Roster</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}body{overflow:hidden;background:#06060a;font-family:'JetBrains Mono',monospace}canvas{display:block}

/* ── Hero select ── */
#hero-select{position:fixed;inset:0;z-index:210;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(3,3,6,.97);user-select:none}
#hero-select.hidden{display:none}
#hero-select h1{font-family:'Rajdhani',sans-serif;font-size:2.2rem;font-weight:700;color:#e8c547;letter-spacing:.2em;text-transform:uppercase;text-shadow:0 0 40px rgba(232,197,71,.2);margin-bottom:4px}
#hero-select .sub{color:#444;font-size:.55rem;letter-spacing:.1em;margin-bottom:20px}
.hero-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:700px}
.hero-card{width:120px;padding:14px 10px;border:1px solid rgba(255,255,255,.06);border-radius:6px;background:rgba(255,255,255,.015);cursor:pointer;text-align:center;transition:border-color .2s,background .2s}
.hero-card:hover{border-color:rgba(232,197,71,.35);background:rgba(232,197,71,.03)}
.hero-card .hc-icon{font-size:1.6rem;margin-bottom:6px}
.hero-card .hc-name{font-family:'Rajdhani',sans-serif;font-size:.8rem;color:#ccc;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
.hero-card .hc-class{font-size:.42rem;color:#888;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.hero-card .hc-desc{font-size:.4rem;color:#555;line-height:1.6}
.hero-card .hc-abil{font-size:.38rem;color:#e8c547;margin-top:6px;letter-spacing:.03em}

/* ── Ability HUD ── */
#abil-hud{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);z-index:60;pointer-events:none;display:flex;gap:6px}
.ab-slot{width:40px;height:40px;border:1px solid rgba(255,255,255,.08);border-radius:4px;background:rgba(0,0,0,.4);position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column}
.ab-slot .ab-key{position:absolute;top:-11px;font-size:.38rem;color:#444;letter-spacing:.04em}
.ab-slot .ab-ic{font-size:1rem}
.ab-slot .ab-cd{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);border-radius:0 0 3px 3px}
.ab-slot .ab-cd-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:700;color:#aaa}
.ab-slot.ready{border-color:rgba(232,197,71,.35)}
.ab-slot.active{border-color:rgba(90,245,166,.4);box-shadow:0 0 8px rgba(90,245,166,.15)}
.ab-slot.ult{border-color:rgba(255,255,255,.1)}
.ab-slot.ult.ready{border-color:rgba(232,197,71,.5);box-shadow:0 0 6px rgba(232,197,71,.1)}

/* ── Passive indicator ── */
#passive-ind{position:fixed;bottom:98px;left:50%;transform:translateX(-50%);z-index:59;pointer-events:none;font-size:.4rem;color:#555;letter-spacing:.06em;text-align:center}
#passive-ind.active{color:#5af5a6}

/* ── Ability activation flash ── */
#abil-flash{position:fixed;inset:0;z-index:42;pointer-events:none;opacity:0;transition:opacity .15s}

/* ── Carried from v5 (compact) ── */
#match-banner{position:fixed;top:18%;left:50%;transform:translateX(-50%);z-index:150;pointer-events:none;text-align:center;opacity:0;transition:opacity .3s}
#match-banner.show{opacity:1}#match-banner h2{font-family:'Rajdhani',sans-serif;font-size:1.7rem;font-weight:700;color:#e8c547;letter-spacing:.12em;text-transform:uppercase;text-shadow:0 0 25px rgba(232,197,71,.3)}
#match-banner .bsub{color:#666;font-size:.55rem;margin-top:3px}
#callout{position:fixed;bottom:102px;left:50%;transform:translateX(-50%);z-index:54;pointer-events:none;font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:600;color:rgba(255,255,255,.25);letter-spacing:.1em;text-transform:uppercase}
#downed-ov{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;flex-direction:column;pointer-events:none}
#downed-ov.show{display:flex;background:radial-gradient(ellipse at center,rgba(0,0,0,.3) 30%,rgba(120,20,20,.4) 100%)}
#downed-ov h2{font-family:'Rajdhani',sans-serif;font-size:1.4rem;color:#f44;letter-spacing:.2em;text-transform:uppercase;animation:pD 1s infinite}
#downed-ov .bl-bar{width:150px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:6px;overflow:hidden}
#downed-ov .bl-f{height:100%;background:linear-gradient(90deg,#c33,#f64);border-radius:2px}
#downed-ov .ri{color:#777;font-size:.45rem;margin-top:4px}
@keyframes pD{0%,100%{opacity:.6}50%{opacity:1}}
#spec-bar{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:85;display:none;background:rgba(6,6,12,.8);border:1px solid rgba(255,255,255,.06);padding:4px 12px;border-radius:3px;font-size:.48rem;color:#777;pointer-events:none}
#spec-bar.show{display:block}#spec-bar span{color:#e8c547}
#squad-hud{position:fixed;top:8px;left:8px;z-index:60;pointer-events:none}
.sqm{display:flex;align-items:center;gap:4px;margin-bottom:2px;font-size:.42rem}
.sqd{width:5px;height:5px;border-radius:50%;flex-shrink:0}.sqn{color:#999;min-width:40px}.sqhb{width:45px;height:2px;background:rgba(255,255,255,.04);border-radius:1px;overflow:hidden}.sqhf{height:100%;border-radius:1px}.sqhf.s{background:#3a8adb}.sqhf.h{background:#3ab854}
.sqm.dn .sqn{color:#c33;text-decoration:line-through}.sqm.el .sqn{color:#333;text-decoration:line-through}
#match-info{position:fixed;top:6px;left:50%;transform:translateX(-50%);z-index:60;pointer-events:none;text-align:center}
#sq-alive{font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:700;color:#ddd;letter-spacing:.06em}
#ring-t{font-size:.42rem;color:#666;margin-top:1px}
#inv-bar{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:60;pointer-events:none;display:flex;gap:4px}
.is{width:34px;height:34px;border:1px solid rgba(255,255,255,.06);border-radius:3px;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;font-size:.42rem;color:#666}
.is.act{border-color:rgba(232,197,71,.25);background:rgba(232,197,71,.02)}.is .ik{position:absolute;top:-9px;font-size:.35rem;color:#333}.is .ii{font-size:.65rem}.is .ic{font-size:.35rem;color:#e8c547}
.is.r-rare{border-color:rgba(60,140,255,.3)}.is.r-epic{border-color:rgba(160,60,220,.3)}.is.r-legendary{border-color:rgba(232,197,71,.35)}
#ammo-hud{position:fixed;bottom:12px;right:12px;z-index:60;pointer-events:none;text-align:right}
.ar{font-size:.38rem;color:#555;line-height:1.4}.ar span{display:inline-block;width:4px;height:4px;border-radius:1px;margin-right:2px;vertical-align:middle}
#wep-hud{position:fixed;bottom:50px;right:12px;z-index:60;pointer-events:none;text-align:right}
#w-n{font-family:'Rajdhani',sans-serif;font-size:.6rem;color:#777;letter-spacing:.04em;text-transform:uppercase}
#w-a{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:#e8c547;line-height:1}#w-a.emp{color:#c33}
#w-rb{width:60px;height:2px;background:rgba(255,255,255,.04);border-radius:1px;margin-top:2px;margin-left:auto;overflow:hidden}#w-rf{height:100%;width:0;background:#e8c547}
#vitals{position:fixed;bottom:50px;left:12px;z-index:60;pointer-events:none;width:150px}

.vb{flex:1;height:3px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden}
.vf{height:100%;border-radius:2px;transition:width .1s}.vf.sh{background:linear-gradient(90deg,#3a8adb,#62c6ff)}.vf.hp{background:linear-gradient(90deg,#3ab854,#6aef7a)}.vf.hp.low{background:linear-gradient(90deg,#c43030,#ef4a4a)}
.vv{min-width:18px;text-align:right;font-size:.38rem;color:#555;margin-left:3px}
#interact{position:fixed;bottom:44%;left:50%;transform:translateX(-50%);z-index:55;pointer-events:none;opacity:0;font-size:.52rem;color:#bbb;background:rgba(0,0,0,.45);padding:3px 9px;border-radius:3px;transition:opacity .1s}#interact span{color:#e8c547}
#rev-bar{position:fixed;bottom:40%;left:50%;transform:translateX(-50%);z-index:56;display:none;text-align:center}#rev-bar.show{display:block}
.rbl{font-size:.45rem;color:#5af5a6;margin-bottom:2px}.rbb{width:90px;height:3px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden}.rbf{height:100%;background:#5af5a6}
#xh{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;pointer-events:none}
.xd{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}
.xa{position:absolute;background:rgba(255,255,255,.4)}.xa.t{width:1px;height:6px;left:50%;transform:translateX(-50%)}.xa.b{width:1px;height:6px;left:50%;transform:translateX(-50%)}
.xa.l{height:1px;width:6px;top:50%;transform:translateY(-50%)}.xa.r{height:1px;width:6px;top:50%;transform:translateY(-50%)}
#xh.hit .xd{background:#e8c547;box-shadow:0 0 4px #e8c547}#xh.kill .xd{background:#f44;box-shadow:0 0 5px #f44}
#hitm{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:51;pointer-events:none;opacity:0}#hitm.show{opacity:1}#hitm.kill svg line{stroke:#f44}
#vig-d{position:fixed;inset:0;z-index:45;pointer-events:none;opacity:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(200,30,30,.4) 100%);transition:opacity .08s}
#vig-sb{position:fixed;inset:0;z-index:46;pointer-events:none;opacity:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(60,140,255,.5) 100%);transition:opacity .05s}
#vig-ring{position:fixed;inset:0;z-index:43;pointer-events:none;opacity:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(200,60,20,.3) 100%);transition:opacity .3s}
#dmg-c{position:fixed;inset:0;z-index:52;pointer-events:none;overflow:hidden}
.dn{position:absolute;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.8rem;pointer-events:none;text-shadow:0 1px 2px rgba(0,0,0,.8);animation:dnF .6s ease-out forwards}
.dn.sh{color:#62c6ff}.dn.hp{color:#f64}.dn.hd{color:#e8c547;font-size:1rem}
@keyframes dnF{0%{opacity:1;transform:translateY(0) scale(1.1)}50%{opacity:1}100%{opacity:0;transform:translateY(-30px) scale(.8)}}
#kf{position:fixed;top:26px;right:8px;z-index:60;pointer-events:none;display:flex;flex-direction:column;gap:2px;align-items:flex-end}
.kfe{font-size:.42rem;color:#888;background:rgba(0,0,0,.3);padding:2px 5px;border-radius:2px;animation:kfF 3s forwards}.kfe .kn{color:#e8c547}
@keyframes kfF{0%,70%{opacity:1}100%{opacity:0}}
#minimap{position:fixed;top:6px;right:6px;z-index:60;pointer-events:none}#minimap canvas{border:1px solid rgba(255,255,255,.05);border-radius:3px;background:rgba(6,6,12,.6)}
#dbg{position:fixed;bottom:4px;left:4px;z-index:57;background:rgba(6,6,12,.6);border:1px solid rgba(232,197,71,.05);padding:3px 6px;border-radius:2px;font-size:.38rem;color:#555;line-height:1.3;pointer-events:none;min-width:100px}#dbg .dl{color:#333}#dbg .dv{color:#e8c547}
</style>

<!-- Hero Select -->

<!-- All HUD elements -->

<div id="abil-hud">
  <div class="ab-slot" id="ab-q"><div class="ab-key">Q</div><div class="ab-ic">—</div><div class="ab-cd" id="ab-q-cd" style="height:0"></div><div class="ab-cd-txt" id="ab-q-txt"></div></div>
  <div class="ab-slot ult" id="ab-z"><div class="ab-key">Z</div><div class="ab-ic">—</div><div class="ab-cd" id="ab-z-cd" style="height:0"></div><div class="ab-cd-txt" id="ab-z-txt"></div></div>
</div>
<div id="passive-ind"></div>
<div id="abil-flash"></div>
<div id="inv-bar"></div><div id="ammo-hud"></div>
<div id="wep-hud"><div id="w-n">—</div><div id="w-a">0</div><div id="w-rb"><div id="w-rf"></div></div></div>
<div id="vitals"><div class="vr"><div class="vi">S</div><div class="vb"><div class="vf sh" id="sf"></div></div><div class="vv" id="sv">0</div></div><div class="vr"><div class="vi">H</div><div class="vb"><div class="vf hp" id="hf"></div></div><div class="vv" id="hv">100</div></div></div>

<div id="minimap"><canvas id="mm" width="130" height="130"></canvas></div>
<div id="dbg"><div><span class="dl">SPD </span><span class="dv" id="d-s">0</span></div><div><span class="dl">HERO </span><span class="dv" id="d-h">—</span></div><div><span class="dl">RING </span><span class="dv" id="d-r">—</span></div><div><span class="dl">FPS </span><span class="dv" id="d-f">0</span></div></div>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.163.0/build/three.module.js"}}</script>
<script type="module">
import*as THREE from'three';

/* ═══════════════════════════════════════════════════════════════
   M1: CONFIG
   ═══════════════════════════════════════════════════════════════ */
const C={WS:6,SS:10.5,CS:3,GA:55,GF:9,AA:12,ASC:2.5,AF:.2,SE:5,SB:1.15,SF:2.2,SM:2,SCD:.4,SG:1.5,JF:8.5,GR:23,COY:.1,JBF:.1,MMH:2.2,MMN:.4,MR:1,MD:.25,PH:1.8,PCH:1,PR:.35,EY:.85,STP:.35,SENS:.002,FOV:90,FOVS:5,FL:8,MHP:100,MSH:100,SRD:5,SRR:15,HSM:2,BLEED:30,REVT:5,REVD:2.5,BFC:.35,BAC:.4,BER:35,BRP:15,MAP_R:95,RING:[{delay:45,shrink:30,endR:.7,dps:1},{delay:30,shrink:25,endR:.45,dps:3},{delay:20,shrink:20,endR:.22,dps:8},{delay:15,shrink:15,endR:.05,dps:15}],DROP_H:60,DROP_SPD:18,LINT:2.5,ZIP_SPEED:18,ZIP_ATTACH:2.5,ZIP_BOOST:6,PAD_V:16,PAD_H:8,PAD_R:1.2,DOOR_INT:2.5,BIN_INT:2};

/* ═══════════════════════════════════════════════════════════════
   M2: EVENT BUS
   ═══════════════════════════════════════════════════════════════ */
const Ev={_l:{},on(e,f){(this._l[e]??=[]).push(f)},emit(e,d){for(const f of this._l[e]||[])f(d)}};

/* ═══════════════════════════════════════════════════════════════
   M3: HERO DEFINITIONS — Data-driven ability configs
   Each hero has: passive, tactical (Q), and ultimate (Z).
   Adding a new hero = add an entry here. The AbilitySystem
   resolves all effects through a dispatch table — no core rewrites.
   ═══════════════════════════════════════════════════════════════ */
const HEROES = {
  forge: {
    id:'forge', name:'Forge', role:'Assault', icon:'🔥', color:0xf57a3a,
    desc:'Aggressive frontline fighter',
    passive: { id:'hot_reload', name:'Hot Reload', desc:'Reload 25% faster after a knock',
      // Applied reactively via event listener — no tick needed
    },
    tactical: { id:'stim', name:'Stim', icon:'💉', desc:'+30% speed, −recoil for 6s. Costs 10 HP',
      cooldown:16, duration:6, hpCost:10, speedMult:1.3, recoilMult:.5,
    },
    ultimate: { id:'airstrike', name:'Orbital Strike', icon:'☄️', desc:'Area damage (50) after 2s delay in 8m radius',
      cooldown:120, delay:2, radius:8, damage:50,
    },
  },
  wraith: {
    id:'wraith', name:'Wraith', role:'Skirmisher', icon:'👻', color:0x9b59b6,
    desc:'Elusive repositioner with phase tech',
    passive: { id:'voices', name:'Voices', desc:'Warning flash when an enemy aims at you' },
    tactical: { id:'phase', name:'Phase Walk', icon:'🌀', desc:'Invulnerable dash for 0.25s',
      cooldown:15, duration:.25, speed:30,
    },
    ultimate: { id:'portal', name:'Dimensional Rift', icon:'🌌', desc:'Place a two-way portal for your squad (10s)',
      cooldown:150, duration:10,
    },
  },
  seer: {
    id:'seer', name:'Seer', role:'Recon', icon:'👁', color:0x5ab8f5,
    desc:'Micro-drone intel specialist',
    passive: { id:'heartbeat', name:'Heartbeat Sensor', desc:'Nearby enemies (<20m) pulse on HUD edge',
      range:20,
    },
    tactical: { id:'focus', name:'Focus Scan', icon:'📡', desc:'Reveal enemies in 30m cone for 4s',
      cooldown:25, duration:4, range:30, angle:45,
    },
    ultimate: { id:'exhibit', name:'Exhibit', icon:'🔮', desc:'25m dome — enemies firing or moving inside are revealed for 12s',
      cooldown:120, radius:25, duration:12,
    },
  },
  lifeline: {
    id:'lifeline', name:'Lifeline', role:'Support', icon:'✚', color:0x5af5a6,
    desc:'Combat medic with healing tech',
    passive: { id:'fast_rev', name:'Combat Revive', desc:'Revive 40% faster (3s base)' },
    tactical: { id:'drone', name:'D.O.C. Drone', icon:'💊', desc:'Heal drone: 8 HP/s to allies in 6m for 8s',
      cooldown:30, duration:8, hps:8, radius:6,
    },
    ultimate: { id:'care_pkg', name:'Care Package', icon:'📦', desc:'Call supply drop with epic+ loot after 4s',
      cooldown:180, delay:4,
    },
  },
  catalyst: {
    id:'catalyst', name:'Catalyst', role:'Controller', icon:'🛡', color:0xf5c842,
    desc:'Area denial with ferrofluid tech',
    passive: { id:'barricade', name:'Barricade', desc:'Reinforced doors take longer to break' },
    tactical: { id:'spikes', name:'Piercing Spikes', icon:'⬥', desc:'Slow zone: enemies −40% speed for 8s in 5m radius',
      cooldown:22, duration:8, radius:5, slowMult:.6,
    },
    ultimate: { id:'wall', name:'Ferro Wall', icon:'🧱', desc:'Deploy cover wall (12m wide) that blocks sight for 20s',
      cooldown:120, duration:20, width:12, height:3,
    },
  },
};

/* ═══════════════════════════════════════════════════════════════
   M4: ABILITY STATE — Per-entity ability tracker
   ═══════════════════════════════════════════════════════════════ */
class AbilState {
  constructor(heroDef) {
    this.hero = heroDef;
    this.tac = { cd: 0, active: false, timer: 0, data: {} };
    this.ult = { cd: 0, active: false, timer: 0, data: {} };
    // Passive state (hero-specific)
    this.passiveData = {};
  }
  get tacReady() { return this.tac.cd <= 0 && !this.tac.active; }
  get ultReady() { return this.ult.cd <= 0 && !this.ult.active; }
  tick(dt) {
    this.tac.cd = Math.max(0, this.tac.cd - dt);
    this.ult.cd = Math.max(0, this.ult.cd - dt);
    if (this.tac.active) { this.tac.timer -= dt; if (this.tac.timer <= 0) this.tac.active = false; }
    if (this.ult.active) { this.ult.timer -= dt; if (this.ult.timer <= 0) this.ult.active = false; }
  }
}

/* ═══════════════════════════════════════════════════════════════
   M5: ABILITY SYSTEM — Dispatch table for all ability effects
   Pure functions: activate(ent, allEnts, scene) and
   tickEffect(ent, dt, allEnts, scene) per ability ID.
   ═══════════════════════════════════════════════════════════════ */
const AbilFX = { objects: [] }; // 3D objects managed by abilities

const AbilSys = {
  activate(ent, slot, allEnts, scene) {
    const as = ent.abil;
    const def = slot === 'tac' ? as.hero.tactical : as.hero.ultimate;
    const st = slot === 'tac' ? as.tac : as.ult;
    if (st.cd > 0 || st.active) return false;
    if (ent.life !== Life.A) return false;

    st.cd = def.cooldown;

  /** Per-frame tick for active ability effects */
  tickEffects(ent, dt, allEnts, t) {

    // Tactical active effects

      const def = as.hero.tactical;
      switch (def.id) {
        case 'drone':
          if (as.tac.data.mesh) { as.tac.data.mesh.rotation.y = t * 3; as.tac.data.mesh.position.y = as.tac.data.pos.y + 1.5 + Math.sin(t * 2) * .15; if (as.tac.data.light) as.tac.data.light.position.copy(as.tac.data.mesh.position); }
          for (const e of allEnts) { if (e.sqId === ent.sqId && e.life === Life.A && e.pos.distanceTo(as.tac.data.pos) < as.tac.data.radius) e.hp = Math.min(e.hp + as.tac.data.hps * dt, C.MHP); }
          break;
        case 'spikes':
          for (const e of allEnts) { if (e.sqId !== ent.sqId && e.life === Life.A && e.pos.distanceTo(as.tac.data.center) < as.tac.data.radius) e._slowMult = as.tac.data.slowMult; }
          break;
      }
    }
    // Ultimate active effects
    if (as.ult.active) {
      const def = as.hero.ultimate;
      switch (def.id) {
        case 'airstrike':
          if (!as.ult.data.detonated) { as.ult.data.delay -= dt;
            if (as.ult.data.delay <= 0) { as.ult.data.detonated = true;
              for (const e of allEnts) { if (e.sqId !== ent.sqId && e.life === Life.A && e.pos.distanceTo(as.ult.data.target) < as.ult.data.radius) e.takeDmg(as.ult.data.damage, ent, false); }
            }}
          break;
        case 'exhibit':
          for (const e of allEnts) { if (e.sqId !== ent.sqId && e.life === Life.A && e.pos.distanceTo(as.ult.data.center) < as.ult.data.radius && e.hSpd > .5) { e._revealed = true; e._revealTimer = Math.max(e._revealTimer || 0, 1); } }
          if (as.ult.data.dome) { as.ult.data.dome.material.opacity = .04 + Math.sin(t * 3) * .02; }
          break;
        case 'care_pkg':
          if (!as.ult.data.dropped) { as.ult.data.delay -= dt;
            if (as.ult.data.delay <= 0) { as.ult.data.dropped = true;
              // Spawn a loot node with guaranteed epic+
              const items = [{ t: 'w', wid: LT.wp[Math.floor(Math.random() * LT.wp.length)], r: Math.random() < .4 ? 'legendary' : 'epic' }, { t: 'c', cid: 'battery', am: 2 }, { t: 'c', cid: 'medkit', am: 1 }];

          break;
        case 'portal':
          if (!as.ult.data.placed && as.ult.timer < as.hero.ultimate.duration - .5) {
            as.ult.data.exit = ent.pos.clone(); as.ult.data.placed = true;
            // Visual at exit
            const p2 = new THREE.Mesh(new THREE.TorusGeometry(.8, .08, 8, 16),
              new THREE.MeshStandardMaterial({ color: 0x9b59b6, emissive: 0x9b59b6, emissiveIntensity: .4 }));
            p2.position.copy(as.ult.data.exit); p2.position.y += 1; p2.rotation.x = Math.PI / 2;
            sceneRef.add(p2); as.ult.data.exitMesh = p2;
            AbilFX.objects.push({ mesh: p2, timer: as.ult.timer + 1 });
          }
          // Teleport allies near entry → exit and vice versa
          if (as.ult.data.placed && as.ult.data.entry && as.ult.data.exit) {
            for (const e of allEnts) { if (e.sqId === ent.sqId && e.life === Life.A) {
              if (e.pos.distanceTo(as.ult.data.entry) < 1.5 && !e._portalCd) { e.pos.copy(as.ult.data.exit); e._portalCd = 2; }
              else if (e.pos.distanceTo(as.ult.data.exit) < 1.5 && !e._portalCd) { e.pos.copy(as.ult.data.entry); e._portalCd = 2; }
              if (e._portalCd) { e._portalCd -= dt; if (e._portalCd <= 0) e._portalCd = 0; }
            }}
          }
          break;
        case 'wall':
          if (as.ult.data.mesh) as.ult.data.mesh.material.opacity = .5 + Math.sin(t * 2) * .15;
          break;
      }
    }
    // Reveal timer decay (used by Seer scan/exhibit)
    for (const e of allEnts) { if (e._revealTimer > 0) { e._revealTimer -= dt; if (e._revealTimer <= 0) { e._revealed = false; e._revealTimer = 0; } } }
    // Slow decay
    for (const e of allEnts) { if (e._slowMult && e._slowMult < 1) { /* cleared each frame, reapplied by spikes tick */ } }
  },

  /** Clean up expired FX objects */
  tickFX(dt, scene) {
    for (let i = AbilFX.objects.length - 1; i >= 0; i--) {
      const o = AbilFX.objects[i]; o.timer -= dt;
      if (o.timer <= 0) { scene.remove(o.mesh); if (o.removeCb) o.removeCb(); AbilFX.objects.splice(i, 1); }
    }
  },

  /** Get speed multiplier from active abilities */
  getSpeedMult(ent) {
    let m = 1;
    if (ent.abil?.tac.active && ent.abil.hero.tactical.id === 'stim') m *= ent.abil.tac.data.speedMult || 1;
    if (ent._slowMult && ent._slowMult < 1) m *= ent._slowMult;
    ent._slowMult = 1; // reset each frame
    return m;
  },

  /** Get recoil multiplier */
  getRecoilMult(ent) {
    if (ent.abil?.tac.active && ent.abil.hero.tactical.id === 'stim') return ent.abil.tac.data.recoilMult || 1;
    return 1;
  },

  /** Check if entity is invulnerable (phase walk) */
  isInvuln(ent) {
    return ent.abil?.tac.active && ent.abil.hero.tactical.id === 'phase';
  },

  /** Get revive time multiplier (lifeline passive) */
  getRevTimeMult(ent) {
    return ent.abil?.hero.passive.id === 'fast_rev' ? .6 : 1;
  },
};

  const ib=document.getElementById('inv-bar');ib.innerHTML='';for(let i=0;i<2;i++){const w=pe.inv.weps[i];const d=document.createElement('div');d.className='is'+(i===pe.inv.wi?' act':'')+(w?.d.rarity?' r-'+w.d.rarity:'');d.innerHTML=`<div class="ik">${i+1}</div><div class="ii">${w?'🔫':'·'}</div><div class="ic">${w?w.d.n.split(' ')[0]:''}</div>`;ib.appendChild(d)}
  ['syringe','medkit','cell','battery'].forEach((c,i)=>{const ct=pe.inv.cons[c]||0;const d=document.createElement('div');d.className='is';d.innerHTML=`<div class="ik">${i+3}</div><div class="ii">${CONS[c].ic}</div><div class="ic">${ct||''}</div>`;ib.appendChild(d)});
  const sqH=document.getElementById('squad-hud');sqH.innerHTML='';allE.filter(e=>e.sqId===pe.sqId).forEach(e=>{const d=document.createElement('div');d.className='sqm'+(e.life===Life.D?' dn':'')+(e.life===Life.E?' el':'');d.innerHTML=`<div class="sqd" style="background:${e.life===Life.A?'#5ab8f5':e.life===Life.D?'#c33':'#333'}"></div><div class="sqn">${e.name}</div><div class="sqhb"><div class="sqhf s" style="width:${e.sh/C.MSH*100}%"></div></div><div class="sqhb"><div class="sqhf h" style="width:${e.hp/C.MHP*100}%"></div></div>`;sqH.appendChild(d)});
  document.getElementById('sq-alive').textContent=Match.sqA+' Squads';document.getElementById('ring-t').textContent=ring.txt();
  const dov=document.getElementById('downed-ov');dov.classList.toggle('show',pe.life===Life.D);if(pe.life===Life.D){document.getElementById('bl-f').style.width=(pe.bleedT/C.BLEED*100)+'%';document.getElementById('ri-t').textContent=pe.beingRev?'Being revived…':'Waiting…'}
  document.getElementById('spec-bar').classList.toggle('show',Spec.on);if(Spec.on)document.getElementById('sp-n').textContent=Spec.t?.name||'—';
  document.getElementById('xh').style.display=(pe.life===Life.A&&!Spec.on&&!pe.dropping&&!pe.onZip)?'':'none';document.getElementById('vitals').style.display=pe.life===Life.A?'':'none';document.getElementById('wep-hud').style.display=(pe.life===Life.A&&!pe.dropping&&!pe.onZip)?'':'none';document.getElementById('abil-hud').style.display=(pe.life===Life.A&&!Spec.on)?'':'none';
  fB.push(1/dt);if(fB.length>30)fB.shift();document.getElementById('d-s').textContent=pe.hSpd.toFixed(1);document.getElementById('d-h').textContent=pe.abil.hero.name;document.getElementById('d-r').textContent=`S${ring.stg+1} R${ring.cR.toFixed(0)}`;document.getElementById('d-f').textContent=(fB.reduce((a,b)=>a+b,0)/fB.length).toFixed(0);
  drawMM(pe,allE,ring);ren.render(scene,cam);I.end();
}
requestAnimationFrame(loop);
